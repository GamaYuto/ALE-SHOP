<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administrador | Ale Shop</title>
    <!-- Usamos los mismos estilos base más algunos extras -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="admin-app">

        <!-- 1. Pantalla de Login -->
        <div id="login-screen" class="admin-container"
            style="max-width: 400px; margin: 100px auto; padding: 2rem; background: white; border-radius: 15px; box-shadow: var(--shadow);">
            <h2 style="text-align:center; margin-bottom: 1.5rem;">🔐 Acceso Restringido</h2>
            <form id="login-form" class="admin-form">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="username" placeholder="admin" required class="input-field">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="••••" required class="input-field">
                </div>
                <button type="submit" class="btn-cta" style="width:100%;">Ingresar</button>
            </form>
        </div>

        <!-- 2. Dashboard (Oculto inicialmente) -->
        <div id="dashboard-screen" class="container" style="display: none; padding-top: 2rem;">
            <header class="admin-header">
                <h2>⚙️ Panel de Control</h2>
                <div style="display:flex; gap: 1rem;">
                    <button id="btn-view-site" class="btn-secondary">Ver Tienda</button>
                    <button id="btn-logout" class="btn-secondary">Cerrar Sesión</button>
                </div>
            </header>

            <section class="admin-actions">
                <button id="btn-create" class="btn-primary">+ Nuevo Producto</button>
            </section>

            <!-- Tabla de Productos -->
            <div class="table-responsive">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Imagen</th>
                            <th>Nombre</th>
                            <th>Precio (COP)</th>
                            <th>Stock</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="admin-products-list">
                        <!-- Se llena con JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 3. Modal para Crear/Editar (Oculto) -->
        <div id="product-modal" class="cart-overlay">
            <div class="cart-modal" style="max-width: 600px; margin: auto; height: auto; border-radius: 15px;">
                <h3 id="modal-title">Editar Producto</h3>
                <form id="product-form" style="display:flex; flex-direction:column; gap:1rem; margin-top:1rem;">
                    <input type="hidden" id="edit-id">

                    <div class="form-row">
                        <div class="form-group">
                            <label>Nombre del Producto</label>
                            <input type="text" id="p-name" required class="input-field">
                        </div>
                        <div class="form-group">
                            <label>Categoría</label>
                            <select id="p-category" class="input-field">
                                <option value="Ropa">Ropa</option>
                                <option value="Maquillaje">Maquillaje</option>
                                <option value="Accesorios">Accesorios</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Precio (COP)</label>
                            <input type="number" id="p-price" required class="input-field">
                        </div>
                        <div class="form-group">
                            <label>Stock</label>
                            <input type="number" id="p-stock" required class="input-field">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>URL de Imagen</label>
                        <input type="url" id="p-image" placeholder="https://..." required class="input-field">
                    </div>

                    <div class="form-group" style="flex-direction:row; align-items:center; gap:0.5rem;">
                        <input type="checkbox" id="p-active">
                        <label for="p-active">Producto Activo (Visible en tienda)</label>
                    </div>

                    <div style="display:flex; gap:1rem; margin-top:1rem;">
                        <button type="button" id="btn-cancel" class="btn-secondary" style="flex:1;">Cancelar</button>
                        <button type="submit" class="btn-primary" style="flex:1;">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
    <script type="module" src="/src/admin.js"></script>
</body>

</html>
